services:
  s3:
    build: .
    ports:
      - "8080:8080"
    environment:
      # シングルユーザー認証情報
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      # ストレージパス（コンテナ内）
      S3_STORAGE_PATH: /data
      # リージョン（クライアント設定と合わせる）
      S3_REGION: us-east-1
      # s3proxy (jclouds) からの移行時は true にする
      # S3_XATTR_JCLOUDS_COMPAT: true
    volumes:
      - s3-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8080/')"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  s3-data:
